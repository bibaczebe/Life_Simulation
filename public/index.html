<!DOCTYPE html>
<html lang="pl" data-weather="clear">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Simulation — Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{terminal:'#03050e',panel:'#070b1a',border:'#14203a',accent:'#3a6fff',gold:'#e8a820',cgreen:'#3ddc8c',cred:'#e83a4a',cblue:'#5599ff',cpurple:'#aa55ff',cdim:'#3a4a70',ctext:'#c4cce8'},fontFamily:{mono:['"Roboto Mono"','monospace'],serif:['"IM Fell English"','serif']}}}}
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-terminal text-ctext font-mono h-screen overflow-hidden flex flex-col select-none">

<div id="rain-overlay" class="weather-layer"></div>
<div id="lightning-overlay" class="weather-layer"></div>
<div id="snow-overlay" class="weather-layer"></div>

<div id="loading" class="fixed inset-0 bg-terminal flex flex-col items-center justify-center z-50 gap-4">
  <div class="pulse-ring"></div>
  <div class="text-gold font-semibold tracking-widest text-sm mt-2">LIFE SIMULATION</div>
  <div class="text-cdim text-xs tracking-widest">INITIALIZING...</div>
</div>

<header class="flex items-center gap-2 px-4 bg-panel border-b border-border flex-shrink-0 h-11">
  <span class="text-gold font-semibold tracking-widest text-xs">⚛ LIFE SIM</span>
  <div class="w-px h-4 bg-border mx-1"></div>
  <div id="stat-bar" class="flex gap-1.5 text-xs flex-1 overflow-hidden items-center flex-wrap">
    <span class="stat-chip"><span class="chip-lbl">DZIEŃ</span><b id="h-day" class="text-gold">0</b></span>
    <span class="stat-chip"><span class="chip-lbl">POP</span><b id="h-pop" class="text-cgreen">2</b></span>
    <span class="stat-chip"><span class="chip-lbl">ERA</span><b id="h-era" class="text-gold">—</b></span>
    <span class="stat-chip"><span class="chip-lbl">SEZON</span><b id="h-season" class="text-cblue">—</b></span>
    <span class="stat-chip"><span class="chip-lbl">TEMP</span><b id="h-temp">—</b></span>
    <span class="stat-chip"><span class="chip-lbl">TECH</span><b id="h-tech" class="text-cpurple">0</b></span>
    <span class="stat-chip"><span class="chip-lbl">🍖</span><b id="h-food" class="text-cgreen">0</b></span>
    <span class="stat-chip"><span class="chip-lbl">🪵</span><b id="h-wood" class="text-orange-400">0</b></span>
    <span class="stat-chip weather-chip"><span id="h-wicon">☀️</span><span id="h-wlabel" class="ml-1">Bezchmurnie</span></span>
  </div>
  <div id="audio-row" class="hidden items-center gap-1.5 text-xs text-gold ml-2">
    <div class="flex items-end gap-0.5 h-3"><span class="wave-bar"></span><span class="wave-bar" style="animation-delay:.12s"></span><span class="wave-bar" style="animation-delay:.24s"></span><span class="wave-bar" style="animation-delay:.36s"></span></div>
    <span id="audio-label">Narrator</span>
  </div>
</header>

<main class="flex flex-1 overflow-hidden">

  <div id="canvas-wrap" class="flex-1 relative overflow-hidden">
    <canvas id="world"></canvas>
    <div class="absolute top-2.5 left-3 text-xs text-cdim pointer-events-none"><span id="hud-time">☀️ DZIEŃ</span></div>
    <div class="absolute top-2.5 right-3 text-right pointer-events-none">
      <div id="day-num" class="text-4xl font-bold text-gold leading-none" style="text-shadow:0 0 24px rgba(232,168,32,.5)">0</div>
      <div class="text-xs text-cdim tracking-widest">DZIEŃ</div>
    </div>
    <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-white/5">
      <div id="day-fill" class="h-full bg-gradient-to-r from-gold to-orange-500 transition-all duration-200" style="width:0%"></div>
    </div>

    <div id="tooltip" class="tooltip hidden">
      <div class="flex items-center gap-2 mb-1">
        <div id="tt-dot" class="w-2.5 h-2.5 rounded-full flex-shrink-0 bg-cblue"></div>
        <div id="tt-name" class="text-gold font-semibold text-sm"></div>
      </div>
      <div id="tt-sub" class="text-cdim text-xs mb-2"></div>
      <div class="space-y-1.5 mb-2">
        <div class="bar-row"><span class="bar-lbl">Energia</span><div class="bar-bg"><div id="bt-energy" class="bar-fill" style="background:linear-gradient(90deg,#ff8822,#ffcc44)"></div></div><span id="bv-energy" class="bar-val"></span></div>
        <div class="bar-row"><span class="bar-lbl">Głód</span>  <div class="bar-bg"><div id="bt-hunger" class="bar-fill" style="background:linear-gradient(90deg,#e83a4a,#ff8844)"></div></div><span id="bv-hunger" class="bar-val"></span></div>
        <div class="bar-row"><span class="bar-lbl">Ciepło</span><div class="bar-bg"><div id="bt-warmth" class="bar-fill" style="background:linear-gradient(90deg,#4488ff,#88ccff)"></div></div><span id="bv-warmth" class="bar-val"></span></div>
        <div class="bar-row"><span class="bar-lbl">Zdrowie</span><div class="bar-bg"><div id="bt-health" class="bar-fill" style="background:linear-gradient(90deg,#22cc44,#88ff88)"></div></div><span id="bv-health" class="bar-val"></span></div>
      </div>
      <div class="border-t border-border pt-1.5">
        <div class="text-xs text-cdim uppercase tracking-widest mb-1">Geny</div>
        <div id="tt-genes" class="grid grid-cols-2 gap-x-3 gap-y-0.5 text-xs"></div>
      </div>
      <div id="tt-thought" class="text-xs italic text-gray-400 font-serif leading-snug mt-1.5"></div>
      <div id="tt-psych" class="text-xs text-cpurple mt-0.5"></div>
      <button id="tt-tree-btn" class="mt-2 text-xs text-cdim hover:text-cblue transition-colors cursor-pointer">🌳 Drzewo genealogiczne</button>
    </div>
  </div>

  <aside class="w-72 bg-panel border-l border-border flex flex-col overflow-hidden flex-shrink-0">

    <!-- God dialogue -->
    <div class="border-b border-border flex-shrink-0">
      <div class="px-3 pt-2 pb-0.5 flex items-center justify-between">
        <span class="text-xs font-mono tracking-widest text-cdim">🧠 BOSKA RADA</span>
        <span id="god-day-label" class="text-xs text-cdim"></span>
      </div>
      <div id="god-dialogue" class="px-2 pb-1.5 space-y-1.5 min-h-[80px]">
        <div class="text-xs text-cdim italic px-1 pt-1">Oczekiwanie na konsultację...</div>
      </div>
      <div id="consensus-wrap" class="hidden px-2 pb-2">
        <div id="consensus-text" class="text-xs rounded px-2 py-1 leading-snug border text-ctext"></div>
      </div>
    </div>

    <!-- Resources -->
    <div class="grid grid-cols-4 border-b border-border flex-shrink-0 text-center">
      <div class="res-cell bdr"><div class="res-icon">🍖</div><div id="r-food"  class="res-val text-cgreen">0</div></div>
      <div class="res-cell bdr"><div class="res-icon">🪵</div><div id="r-wood"  class="res-val text-orange-400">0</div></div>
      <div class="res-cell bdr"><div class="res-icon">🪨</div><div id="r-stone" class="res-val text-gray-400">0</div></div>
      <div class="res-cell">   <div class="res-icon">🔥</div><div id="r-fire"  class="res-val text-cred">✗</div></div>
    </div>

    <!-- Stats mini -->
    <div class="flex px-3 py-1.5 border-b border-border gap-3 text-xs text-cdim flex-shrink-0">
      <span>↑<b id="s-births"    class="text-cgreen ml-0.5">0</b></span>
      <span>↓<b id="s-deaths"    class="text-cred ml-0.5">0</b></span>
      <span>⚡<b id="s-disasters" class="text-orange-400 ml-0.5">0</b></span>
      <span>🔬<b id="s-disc"     class="text-cpurple ml-0.5">0</b></span>
    </div>

    <!-- Timeline -->
    <div id="timeline" class="flex-1 overflow-y-auto scrollbar-custom"></div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-x-2 gap-y-0.5 px-3 py-1.5 border-t border-border text-xs text-cdim flex-shrink-0">
      <span class="legend-dot bg-cblue">M</span>
      <span class="legend-dot bg-pink-400">K</span>
      <span class="legend-dot bg-cgreen">Rośl.</span>
      <span class="legend-dot bg-orange-400">Ogień</span>
      <span class="legend-dot bg-cred">Umiera</span>
      <span class="legend-dot bg-yellow-400">Zbiera</span>
    </div>
  </aside>
</main>

<div id="gen-modal" class="hidden fixed inset-0 bg-black/75 flex items-center justify-center z-50">
  <div class="bg-panel border border-border rounded-xl p-5 w-96 max-h-[80vh] overflow-y-auto scrollbar-custom">
    <div class="flex justify-between mb-3">
      <h2 id="gen-title" class="text-gold font-mono font-semibold text-sm">🌳 Ród</h2>
      <button id="gen-close" class="text-cdim hover:text-white text-lg leading-none">✕</button>
    </div>
    <div id="gen-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
